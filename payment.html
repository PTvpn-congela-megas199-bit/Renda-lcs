<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RENDA LCS — Pagamento</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#34d058;--muted:#cfeee0;--bg-dark: rgba(0,0,0,0.55);--card-radius:14px;--max-width:720px}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Poppins',system-ui,Arial,sans-serif;color:#eafaf0}
    body{background:url('background.jpg') center/cover no-repeat fixed;background-color:#050608;display:flex;flex-direction:column;min-height:100vh}
    .site-header{height:56px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));padding:0 16px}
    .site-header h1{margin:0;color:var(--accent);font-weight:700;font-size:18px}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 16px}
    .card{width:100%;max-width:var(--max-width);background:linear-gradient(180deg,var(--bg-dark),rgba(0,0,0,0.35));border-radius:var(--card-radius);padding:24px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 18px 50px rgba(0,0,0,0.7)}
    h2{color:var(--accent);margin:0 0 12px 0;font-size:20px}
    .balance{font-weight:700;color:#dfffe6;margin-bottom:14px;font-size:16px}
    .method-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .method-btn{flex:1;min-width:120px;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#eafaf0;cursor:pointer;text-align:center;font-weight:700}
    .method-btn.active{background:var(--accent);color:#04260f;border:0;box-shadow:0 8px 20px rgba(52,208,88,0.12)}
    .form-group{margin-bottom:12px}
    label{display:block;margin-bottom:6px;color:#cfeee0;font-size:13px}
    select,input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#eafaf0;font-size:15px}
    .info-small{font-size:13px;color:#cfeee0;margin-top:6px}
    .actions{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap}
    .btn-primary{padding:12px 20px;border-radius:12px;border:0;background:var(--accent);color:#04260f;font-weight:800;cursor:pointer;box-shadow:0 12px 30px rgba(52,208,88,0.12);min-width:160px;text-align:center}
    .btn-secondary{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#eafaf0;font-weight:700;cursor:pointer;min-width:140px;text-align:center}
    .message{margin-top:14px;padding:12px;border-radius:10px;background:rgba(0,255,120,0.04);color:#dfffe6;border:1px solid rgba(230,255,230,0.04);word-break:break-word}
    .history{margin-top:18px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02)}
    .history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .history-row:last-child{border-bottom:0}
    .small-muted{font-size:13px;color:#cfeee0}
    @media (max-width:520px){.card{padding:18px}h2{font-size:18px}.balance{font-size:15px}.method-btn{padding:10px}.btn-primary{min-width:140px}}
  </style>
</head>
<body>
  <header class="site-header"><h1>RENDA LCS</h1></header>

  <main>
    <section class="card" aria-labelledby="pay-title">
      <h2 id="pay-title">Pagamento</h2>
      <div id="balance" class="balance">Saldo: 0.00 MT</div>

      <div class="method-row" role="tablist" aria-label="Método de pagamento">
        <button id="btn-mpesa" class="method-btn active" aria-pressed="true">M-pesa</button>
        <button id="btn-emola" class="method-btn" aria-pressed="false">E-mola</button>
      </div>

      <div class="form-group">
        <label for="amount">Valor a depositar</label>
        <select id="amount" aria-label="Valor a depositar"></select>
        <div class="info-small">Escolha um valor entre 20 MT e 300 MT (passo 20).</div>
      </div>

      <div class="form-group">
        <label for="value-pass">Senha do valor</label>
        <input id="value-pass" type="text" inputmode="numeric" placeholder="Digite a senha do valor" aria-label="Senha do valor" />
      </div>

      <div class="actions">
        <button id="deposit" class="btn-primary" aria-live="polite">Depositar</button>
        <button id="open-chat" class="btn-secondary">Abrir chat de pagamento</button>
      </div>

      <div id="msg" class="message" style="display:none" role="status" aria-live="polite"></div>

      <div class="history" id="history" style="display:none"></div>
    </section>
  </main>

  <footer style="height:44px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));color:#cfeee0;font-weight:700">
    PT_♧2026♧_PT
  </footer>

<script>
(function(){
  // 5% daily interest (compounded)
  const DAILY_RATE = 0.05;
  const PASS_MAP = {
    '20':'1726','40':'7367','60':'8382','80':'0191','100':'2928',
    '120':'4510','140':'5831','160':'9042','180':'1173','200':'2204',
    '220':'3315','240':'4426','260':'5537','280':'6648','300':'7759'
  };
  const SESSION_KEY = 'renda_current';
  const STORAGE_KEY = 'renda_accounts';
  const WA_NUMBER = '+258855789422';
  const MS_PER_DAY = 24 * 60 * 60 * 1000;

  // DOM
  const amountSelect = document.getElementById('amount');
  const passInput = document.getElementById('value-pass');
  const depositBtn = document.getElementById('deposit');
  const msg = document.getElementById('msg');
  const balanceEl = document.getElementById('balance');
  const openChat = document.getElementById('open-chat');
  const btnMpesa = document.getElementById('btn-mpesa');
  const btnEmola = document.getElementById('btn-emola');
  const historyEl = document.getElementById('history');

  // storage helpers
  function loadAccounts(){ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
  function saveAccounts(list){ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
  function currentEmail(){ return localStorage.getItem(SESSION_KEY); }
  function getAccount(){ const email = currentEmail(); if(!email) return null; return loadAccounts().find(a=>a.email===email) || null; }
  function updateAccount(acc){ const list = loadAccounts(); const i = list.findIndex(x=>x.email===acc.email); if(i>-1){ list[i]=acc; saveAccounts(list); } }

  // apply 5% daily interest to each deposit (compounded)
  function applyDailyInterest(acc){
    if(!acc) return;
    if(!Array.isArray(acc.history)) acc.history = [];
    const now = new Date();
    let balanceDelta = 0;
    let changed = false;
    acc.history.forEach(item => {
      if(item.type !== 'deposit') return;
      if(typeof item.principal !== 'number') item.principal = Number(item.amount) || 0;
      if(!item.lastAccrual) item.lastAccrual = item.date || new Date().toISOString();
      const last = new Date(item.lastAccrual);
      const days = Math.floor((now - last) / MS_PER_DAY);
      if(days <= 0) return;
      const principalOld = item.principal;
      const principalNew = principalOld * Math.pow(1 + DAILY_RATE, days);
      const diff = principalNew - principalOld;
      item.principal = Number(principalNew.toFixed(8));
      const newLast = new Date(last.getTime() + days * MS_PER_DAY);
      item.lastAccrual = newLast.toISOString();
      balanceDelta += diff;
      changed = true;
    });
    if(changed){
      acc.balance = (acc.balance || 0) + Number(balanceDelta.toFixed(8));
      acc.balance = Number(acc.balance.toFixed(8));
      updateAccount(acc);
    }
  }

  // UI helpers
  function show(t, err){
    msg.style.display = 'block';
    msg.style.borderColor = err ? '#f5d6d6' : '#e6f3e6';
    msg.style.background = err ? 'rgba(255,230,230,0.04)' : 'rgba(0,255,120,0.04)';
    msg.textContent = t;
    clearTimeout(show._t);
    show._t = setTimeout(()=> msg.style.display = 'none', 6000);
  }

  function refreshBalance(){
    const acc = getAccount();
    if(!acc){ balanceEl.textContent = 'Saldo: 0.00 MT'; return; }
    applyDailyInterest(acc);
    const accRefreshed = getAccount();
    balanceEl.textContent = 'Saldo: ' + (accRefreshed.balance || 0).toFixed(2) + ' MT';
    renderHistory(accRefreshed);
  }

  function renderHistory(acc){
    if(!Array.isArray(acc.history) || acc.history.length === 0){
      historyEl.style.display = 'none';
      return;
    }
    historyEl.style.display = 'block';
    historyEl.innerHTML = '';
    const list = acc.history.slice().reverse();
    list.forEach(item=>{
      const row = document.createElement('div');
      row.className = 'history-row';
      const left = document.createElement('div');
      left.style.display = 'flex';
      left.style.flexDirection = 'column';
      left.style.gap = '4px';
      const t = document.createElement('div');
      t.textContent = item.type === 'deposit' ? 'Depósito' : item.type;
      t.style.fontWeight = '700';
      const d = document.createElement('div');
      d.textContent = new Date(item.date).toLocaleString();
      d.style.fontSize = '13px';
      d.style.color = '#cfeee0';
      left.appendChild(t);
      left.appendChild(d);
      const right = document.createElement('div');
      right.style.textAlign = 'right';
      const amt = document.createElement('div');
      amt.textContent = (item.amount ? item.amount + ' MT' : '—');
      amt.style.fontWeight = '800';
      const princ = document.createElement('div');
      princ.textContent = item.principal ? ('Atual: ' + Number(item.principal).toFixed(2) + ' MT') : '';
      princ.style.fontSize = '13px';
      princ.style.color = '#cfeee0';
      right.appendChild(amt);
      right.appendChild(princ);
      row.appendChild(left);
      row.appendChild(right);
      historyEl.appendChild(row);
    });
  }

  // fill select
  for(let v=20; v<=300; v+=20){
    const opt = document.createElement('option');
    opt.value = String(v);
    opt.textContent = v + ' MT';
    amountSelect.appendChild(opt);
  }

  // method buttons
  let method = 'mpesa';
  btnMpesa.addEventListener('click', ()=>{ method='mpesa'; btnMpesa.classList.add('active'); btnMpesa.setAttribute('aria-pressed','true'); btnEmola.classList.remove('active'); btnEmola.setAttribute('aria-pressed','false'); });
  btnEmola.addEventListener('click', ()=>{ method='emola'; btnEmola.classList.add('active'); btnEmola.setAttribute('aria-pressed','true'); btnMpesa.classList.remove('active'); btnMpesa.setAttribute('aria-pressed','false'); });

  // deposit handler
  depositBtn.addEventListener('click', ()=>{
    const acc = getAccount();
    if(!acc){ show('Faça login primeiro para depositar.', true); setTimeout(()=> window.location.href='index.html', 800); return; }
    const val = amountSelect.value;
    const entered = passInput.value.trim();
    if(!entered){ show('Digite a senha do valor.', true); return; }
    const expected = PASS_MAP[val];
    if(!expected){ show('Valor inválido.', true); return; }
    if(entered !== expected){ show('Senha incorreta. Depósito não autorizado.', true); return; }
    if(acc.lastDeposit && String(acc.lastDeposit) === String(val)){ show('Você já depositou esse valor anteriormente. Escolha outro valor.', true); return; }

    // apply pending interest first
    applyDailyInterest(acc);

    // create deposit item with principal and lastAccrual
    const nowIso = new Date().toISOString();
    const depositItem = {
      type: 'deposit',
      amount: Number(val),
      principal: Number(val),
      date: nowIso,
      lastAccrual: nowIso,
      method
    };
    if(!Array.isArray(acc.history)) acc.history = [];
    acc.history.push(depositItem);

    // credit base amount
    acc.balance = (acc.balance || 0) + Number(val);
    acc.lastDeposit = String(val);
    if(!acc.firstDeposit) acc.firstDeposit = nowIso;

    updateAccount(acc);
    refreshBalance();
    show('Depósito de ' + val + ' MT efetuado com sucesso. Saldo atualizado: ' + (acc.balance || 0).toFixed(2) + ' MT.', false);
    passInput.value = '';
  });

  // open chat
  openChat.addEventListener('click', ()=>{
    const acc = getAccount();
    if(!acc){ show('Faça login primeiro para abrir o chat.', true); setTimeout(()=> window.location.href='index.html', 800); return; }
    const text = method === 'mpesa' ? 'Ola👋, quero investir no M-pesa !' : 'Ola👋, quero investir no E-mola !';
    const url = 'https://wa.me/' + WA_NUMBER.replace(/\D/g,'') + '?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  });

  // init
  refreshBalance();
  window.addEventListener('storage', (e)=>{
    if(e.key === STORAGE_KEY || e.key === SESSION_KEY) refreshBalance();
  });
})();
</script>
</body>
</html>
